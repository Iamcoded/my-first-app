kind = "web"
previewPath = "/"
title = "Crypto Quotes"
version = "1.0.0"
id = "artifacts/crypto-quotes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21255

[services.development]
run = "pnpm --filter @workspace/crypto-quotes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/crypto-quotes", "run", "build" ]
publicDir = "artifacts/crypto-quotes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21255"
BASE_PATH = "/"
